{% extends "base.html" %}
{% block content %}

<!-- Jodit Editor (free, open source, no API key) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jodit@3/build/jodit.min.css">
<script src="https://cdn.jsdelivr.net/npm/jodit@3/build/jodit.min.js"></script>

<form method="POST" id="syllabusForm">
    <table border="0" class="form-table" width="100%" cellspacing="0" cellpadding="0">
        <tbody>
            <tr>
                <td class="tableheading" colspan="6">
                    <span class="mainheadingborderbottom">Syllabus Creation</span>
                </td>
            </tr>
            <tr><td colspan="6" height="15"></td></tr>
            <tr>
                <td class="vtext" width="15%">From Session</td>
                <td class="colon">:</td>
                <td width="30%">
                    <select name="from_session" id="ddlFromSession" class="textbox w-250" required>
                        <option value="0">-- Select From Session --</option>
                        {% for s in sessions %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
                    </select>
                    <span class="required-star">*</span>
                </td>
                <td class="vtext" width="15%">To Session</td>
                <td class="colon">:</td>
                <td width="35%">
                    <select name="to_session" id="ddlToSession" class="textbox w-250">
                        <option value="0">-- Select To Session --</option>
                        {% for s in sessions %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
                    </select>
                </td>
            </tr>
            <tr>
                <td class="vtext">Degree</td>
                <td class="colon">:</td>
                <td valign="top">
                    <select name="degree_id" id="ddlDegree" class="textbox w-250" required>
                        <option value="">--Select Degree--</option>
                        {% for d in degrees %}<option value="{{ d.id }}">{{ d.name }}</option>{% endfor %}
                    </select>
                    <span class="required-star">*</span>
                </td>
                <td class="vtext">Class</td>
                <td class="colon">:</td>
                <td>
                    <select name="semester_id" id="ddlSemester" class="textbox w-250" disabled required>
                        <option value=""> -- Select Class -- </option>
                    </select>
                    <span class="required-star">*</span>
                </td>
            </tr>
            <tr>
                <td class="vtext">Department</td>
                <td class="colon">:</td>
                <td>
                    <select name="dept_id" id="ddlBranch" class="textbox w-250" disabled>
                        <option value="0">--Select Department--</option>
                    </select>
                </td>
                <td class="vtext">Year</td>
                <td class="colon">:</td>
                <td>
                    <select name="year_id" id="ddlYear" class="textbox w-250" disabled>
                        <option value="1">First</option>
                    </select>
                </td>
            </tr>
            <tr><td colspan="6" height="15"></td></tr>
            <tr>
                <td colspan="2"></td>
                <td colspan="4">
                    <input type="button" value="GET COURSES" id="btnGetCourses" class="button-common">
                    <input type="button" value="RESET" id="btnReset" class="button-common" style="margin-left:5px;">
                </td>
            </tr>
        </tbody>
    </table>
</form>

<div id="courseContainer" style="margin-top:20px;"></div>

<!-- Syllabus Popup -->
<div id="SearchDiv" class="white_content-new" style="display:none;">
    <div class="popupboxouter">
        <div class="popupbox">
            <div class="close" onclick="closeSyllabusPopup()">X</div>
            <form method="POST" id="popupForm">
                <input type="hidden" name="action" value="SAVE">
                <input type="hidden" name="course_id" id="pop_course_id">
                <input type="hidden" name="degree_id" id="pop_degree_id">
                <input type="hidden" name="session_from" id="pop_session_from">
                <input type="hidden" name="session_to" id="pop_session_to">
                <table border="0" class="form-table" width="100%" cellspacing="0" cellpadding="0">
                    <tbody>
                        <tr>
                            <td class="tablesubheading" colspan="6">
                                <span class="subheadingborderbottom" id="popupCourseTitle">Syllabus Creation</span>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="6" style="padding:8px 0;">
                                <textarea name="syllabus" id="pop_syllabus" style="width:100%;"></textarea>
                            </td>
                        </tr>
                        <tr>
                            <td colspan="6" align="center" style="padding:8px 0;">
                                <input type="submit" value="SAVE SYLLABUS" class="button-common" style="padding:4px 24px;">
                            </td>
                        </tr>
                    </tbody>
                </table>
            </form>
        </div>
    </div>
</div>

<script>
let joditEditor = null;

function initJodit() {
    if (joditEditor) return;
    joditEditor = Jodit.make('#pop_syllabus', {
        height: 380,
        toolbarButtonSize: 'small',
        buttons: [
            'source', '|',
            'bold', 'italic', 'underline', 'strikethrough', '|',
            'superscript', 'subscript', '|',
            'ul', 'ol', '|',
            'outdent', 'indent', '|',
            'font', 'fontsize', 'brush', 'paragraph', '|',
            'image', 'table', 'link', '|',
            'align', '|',
            'undo', 'redo', '|',
            'hr', 'eraser', 'copyformat', '|',
            'selectall', 'print', 'fullsize'
        ],
        uploader: { insertImageAsBase64URI: true },
        defaultFontSizePoints: 'pt',
        style: { 'font-family': 'Calibri, Arial, sans-serif', 'font-size': '12pt' }
    });
}

document.addEventListener('DOMContentLoaded', function() {
    const ddlDegree     = document.getElementById('ddlDegree');
    const ddlSemester   = document.getElementById('ddlSemester');
    const ddlBranch     = document.getElementById('ddlBranch');
    const ddlYear       = document.getElementById('ddlYear');
    const btnGetCourses = document.getElementById('btnGetCourses');
    const btnReset      = document.getElementById('btnReset');

    ddlDegree.addEventListener('change', function() {
        const degreeId = this.value;
        if (!degreeId) { resetCascading(); return; }
        fetch(`/academics/api/get_degree_details/${degreeId}`)
            .then(r => r.json())
            .then(data => {
                if (data.minsem !== undefined && data.maxsem !== undefined) {
                    fetch(`/academics/api/get_semesters_range/${data.minsem}/${data.maxsem}`)
                        .then(r => r.json())
                        .then(sems => {
                            ddlSemester.innerHTML = '<option value=""> -- Select Class -- </option>';
                            sems.forEach(s => {
                                const o = document.createElement('option');
                                o.value = s.pk_semesterid;
                                o.textContent = s.semester_roman.trim();
                                ddlSemester.appendChild(o);
                            });
                            ddlSemester.disabled = false;
                        });
                }
                if (!data.isug || data.isdepartmentreq) {
                    fetch('/academics/api/get_all_departments')
                        .then(r => r.json())
                        .then(depts => {
                            ddlBranch.innerHTML = '<option value="0">--Select Department--</option>';
                            depts.forEach(d => {
                                const o = document.createElement('option');
                                o.value = d.id;
                                o.textContent = d.name;
                                ddlBranch.appendChild(o);
                            });
                            ddlBranch.disabled = false;
                        });
                } else {
                    ddlBranch.innerHTML = '<option value="0">--Select Department--</option>';
                    ddlBranch.disabled = true;
                }
            });
        ddlSemester.innerHTML = '<option value=""> -- Select Class -- </option>';
        ddlSemester.disabled = true;
        ddlYear.innerHTML = '<option value="1">First</option>';
        ddlYear.disabled = true;
    });

    ddlSemester.addEventListener('change', function() {
        const semId = this.value;
        if (!semId) return;
        fetch(`/academics/api/get_semester_year/${semId}`)
            .then(r => r.json())
            .then(data => {
                ddlYear.innerHTML = '';
                if (data.degreeyear_char) {
                    const o = document.createElement('option');
                    o.value = data.pk_degreeyearid;
                    o.textContent = data.degreeyear_char;
                    o.selected = true;
                    ddlYear.appendChild(o);
                }
                ddlYear.disabled = true;
            });
    });

    btnGetCourses.addEventListener('click', function() {
        const sessionFrom = document.getElementById('ddlFromSession').value;
        const sessionTo   = document.getElementById('ddlToSession').value;
        const degree   = ddlDegree.value;
        const semester = ddlSemester.value;
        const dept     = ddlBranch.value;

        if (sessionFrom == '0' || !degree || !semester) {
            alert('Please select mandatory fields (From Session, Degree, Class).');
            return;
        }

        btnGetCourses.value = 'Getting...';
        btnGetCourses.disabled = true;

        fetch('/academics/api/get_syllabus_courses', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_from: sessionFrom, session_to: sessionTo, degree_id: degree, semester_id: semester, dept_id: dept })
        })
        .then(r => r.json())
        .then(data => { renderCourses(data); })
        .catch(() => { alert('Error fetching courses.'); })
        .finally(() => { btnGetCourses.value = 'GET COURSES'; btnGetCourses.disabled = false; });
    });

    function renderCourses(courses) {
        const container = document.getElementById('courseContainer');
        if (!courses || courses.length === 0) {
            container.innerHTML = '<div style="padding:20px;color:#999;text-align:center;font-size:11px;">No courses found for the selected criteria.</div>';
            return;
        }
        let html = `
            <table border="0" class="form-table" width="100%" cellspacing="0" cellpadding="0">
                <tbody>
                    <tr>
                        <td class="tablesubheading" colspan="6">
                            <span class="subheadingborderbottom">List of Courses</span>
                        </td>
                    </tr>
                    <tr><td colspan="6" height="10"></td></tr>
                    <tr>
                        <td colspan="6">
                            <table class="table-grid-view" width="100%" cellspacing="1" cellpadding="1" rules="all" border="1" style="border:1px solid #D4D4D4;border-collapse:collapse;">
                                <thead>
                                    <tr class="header-style">
                                        <th width="5%">S.No.</th>
                                        <th width="50%" align="left">Course Name</th>
                                        <th width="30%">Create Syllabus</th>
                                        <th width="10%">View</th>
                                    </tr>
                                </thead>
                                <tbody>`;
        courses.forEach((c, i) => {
            const rc = i % 2 === 0 ? 'item-style' : 'item-style-alt';
            const label = c.syllabus ? 'Edit Syllabus' : 'Create Syllabus';
            const dn = (c.display_name || '').replace(/'/g, '&#39;').replace(/"/g, '&quot;');
            html += `<tr class="${rc}">
                <td align="center">${i + 1}</td>
                <td align="left">${c.display_name || ''}</td>
                <td align="center">
                    <a href="javascript:void(0)" class="GridLink"
                       data-cid="${c.id}" data-cname="${dn}"
                       onclick="openSyllabusPopup(this)">${label}</a>
                </td>
                <td align="center">
                    ${c.syllabus ? `<a href="javascript:void(0)" class="GridLink" data-cid="${c.id}" onclick="viewSyllabus(this)">View</a>` : '-'}
                </td>
            </tr>`;
        });
        html += `           </tbody>
                            </table>
                        </td>
                    </tr>
                </tbody>
            </table>`;
        container.innerHTML = html;
    }

    btnReset.addEventListener('click', function() {
        document.getElementById('syllabusForm').reset();
        resetCascading();
        document.getElementById('courseContainer').innerHTML = '';
    });

    function resetCascading() {
        ddlSemester.innerHTML = '<option value=""> -- Select Class -- </option>';
        ddlSemester.disabled = true;
        ddlBranch.innerHTML = '<option value="0">--Select Department--</option>';
        ddlBranch.disabled = true;
        ddlYear.innerHTML = '<option value="">-- Select Year --</option>';
        ddlYear.disabled = true;
    }

    document.getElementById('popupForm').addEventListener('submit', function() {
        if (joditEditor) {
            document.getElementById('pop_syllabus').value = joditEditor.value;
        }
    });
});

window.openSyllabusPopup = function(el) {
    const courseId    = el.dataset.cid;
    const courseName  = el.dataset.cname || '';
    const sessionFrom = document.getElementById('ddlFromSession').value;
    const sessionTo   = document.getElementById('ddlToSession').value;
    const degreeId    = document.getElementById('ddlDegree').value;

    document.getElementById('popupCourseTitle').textContent = 'Syllabus: ' + courseName;
    document.getElementById('pop_course_id').value    = courseId;
    document.getElementById('pop_degree_id').value    = degreeId;
    document.getElementById('pop_session_from').value = sessionFrom;
    document.getElementById('pop_session_to').value   = sessionTo;
    document.getElementById('SearchDiv').style.display = 'block';

    initJodit();

    fetch('/academics/api/get_syllabus', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ course_id: courseId, degree_id: degreeId, session_from: sessionFrom, session_to: sessionTo })
    })
    .then(r => r.json())
    .then(data => { joditEditor.value = data.syllabus || ''; });
};

window.closeSyllabusPopup = function() {
    document.getElementById('SearchDiv').style.display = 'none';
};

window.viewSyllabus = function(el) {
    const courseId    = el.dataset.cid;
    const sessionFrom = document.getElementById('ddlFromSession').value;
    const sessionTo   = document.getElementById('ddlToSession').value;
    const degreeId    = document.getElementById('ddlDegree').value;

    fetch('/academics/api/get_syllabus', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ course_id: courseId, degree_id: degreeId, session_from: sessionFrom, session_to: sessionTo })
    })
    .then(r => r.json())
    .then(data => {
        const win = window.open('', '_blank', 'width=900,height=700');
        win.document.write('<html><head><title>Syllabus</title><style>body{font-family:Calibri,Arial,sans-serif;font-size:12pt;margin:30px;}h2{border-bottom:1px solid #ccc;padding-bottom:6px;}</style></head><body>');
        win.document.write('<h2>Syllabus</h2>');
        win.document.write(data.syllabus || '<p><i>No syllabus content.</i></p>');
        win.document.write('</body></html>');
        win.document.close();
    });
};
</script>
{% endblock %}

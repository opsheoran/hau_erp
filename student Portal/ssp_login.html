        function onsubmitclick() {

            if (document.getElementById("R_txtLogin").value == "" || document.getElementById("R_txtPass").value == "") {
                alert("User Name and Password can not be blank !!!")
                if (document.getElementById("R_txtLogin").value == "")
                    document.getElementById("R_txtLogin").focus();
                else if (document.getElementById("R_txtPass").value == "")
                    document.getElementById("R_txtPass").focus();
                else
                    document.getElementById("R_txtLogin").focus();

                return false;
            }
        }




        function onResetclick() {

            if (document.getElementById("ApplicationNo").value == "" || document.getElementById("R_txtDob").value == "") {
                alert("Enrollment No. and DOB can not be blank !!!")
                if (document.getElementById("ApplicationNo").value == "")
                    document.getElementById("ApplicationNo").focus();
                else if (document.getElementById("R_txtDob").value == "")
                    document.getElementById("R_txtDob").focus();
                else
                    document.getElementById("ApplicationNo").focus();

                return false;
            }
        }

    <script type="text/javascript">
        //
        //Amit Dalakoti
        //10/26/2016
        //Start
        var images = []; // Global Variable.
        $(document).ready(function () {

            fun();
            // fun() Using it for calling Web Method ("GetImageNames")
            // from  "UserLoginPageManagementDtl.aspx" page.
            function fun() {
                $.ajax({
                    type: "POST",
                    url: "/Luvasssp/SMS/Masters/UserLoginPageManagementDtl.aspx/GetImageNames",
                    contentType: "application/json; charset=utf-8",
                    success: function (response) {

                        images = getXMLToArray(response.d); //Passing XML to function
                        changeBackground(); // Calling ChangeBackground function.
                    },
                    error: function (f) {
                        console.log('F');
                    }
                });
            }
            // Function For converting the XMl into Array.
            function getXMLToArray(xml) {

                var array = $(xml).find("ImageName").map(function () {
                    return $(this).text();
                }).get();
                return array;
            }
            //Function to Change Background
            function changeBackground() {
                console.log("A");
                console.log(images);
                var randomNumber = Math.floor(Math.random() * images.length);
                var bgImg = images[randomNumber]; // Setting Random Number.                 
                $('body').css('background', 'url(../FTPsite/Luvas/Loginimage/' + bgImg + ') no-repeat');
                $('body').css('background-size', '100%');
                setTimeout(changeBackground, 5000); // Setting Time for recall.
            }
        });
        //10/26/2016
        //End
    </script>

{% extends "base.html" %}
{% block content %}

<form method="POST" id="mainForm">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
    <input type="hidden" name="action" id="formAction" value="SAVE">

    <table border="0" cellpadding="0" cellspacing="0" class="form-table" width="100%">
        <tbody>
            <tr>
                <td colspan="6" class="gap"></td>
            </tr>
            <tr>
                <td class="tableheading" colspan="6">Student Marks Entry(ExternalUser)</td>
            </tr>
            <tr>
                <td class="tdgap" colspan="6"></td>
            </tr>
            
            <!-- FORM FIELDS -->
            <tr>
                <td class="vtext" id="lblAcdSession" width="15%">Academic Session</td>      
                <td class="colon" width="2%">:</td>
                <td class="required" colspan="4">
                    <select name="session_id" id="session_id" class="dropdownlong" required onchange="fetchCourses()">
                        <option value="">--Select Academic Session--</option>
                        {% for s in lookups.sessions %}
                        <option value="{{ s.id }}" {% if filters.session_id|string == s.id|string %}selected{% endif %}>{{ s.name }}</option>
                        {% endfor %}
                    </select> *
                </td>
            </tr>

            <tr>
                <td colspan="2" style="width:17%"></td>
                <td colspan="4">
                    <input type="button" value="GET COURSES" class="button-common" style="width:131px;" onclick="fetchCourses()">
                </td>
            </tr>

            <!-- COURSE SELECTION -->
            <tr id="courseSelectionHeading" style="display: none;">
                <td class="tablesubheading" colspan="6" style="height: 19px">Course Selection</td>
            </tr>
            <tr class="courseSelectionRow" style="display: none;">
                <td id="lblCourse" class="vtext">Course</td>
                <td class="colon">:</td>
                <td class="required" colspan="4">
                    <select name="course_id" id="course_id" class="dropdownvvlong" onchange="onCourseSelect()">
                        <option value="">--Select Course--</option>
                    </select> *
                </td>
            </tr>
            <tr class="courseSelectionRow" style="display: none;">
                <td class="vtext">Cr. Hr. Theory</td>
                <td class="colon">:</td>
                <td class="required">
                    <input name="txtCrHrTheory" type="text" id="txtCrHrTheory" readonly="readonly" class="textbox" style="width: 50px;">
                </td>
                <td class="vtext">Cr. Hr. Practical</td>
                <td class="colon">:</td>
                <td class="required">
                    <input name="txtCrHrPractical" type="text" id="txtCrHrPractical" readonly="readonly" class="textbox" style="width: 50px;">
                </td>
            </tr>
            <tr class="courseSelectionRow" style="display: none;">
                <td class="vtext">Is NC</td>
                <td class="colon">:</td>
                <td class="required">
                    <span class="chkbox"><input id="chkIsNC" type="checkbox" name="chkIsNC" disabled="disabled"></span>
                </td>
                <td class="vtext">Exam Type</td>
                <td class="colon">:</td>
                <td>
                    <select name="ddlExamType" id="ddlExamType" class="dropdown">
                        <option value="2" selected>External</option>
                    </select>
                </td>
            </tr>
            <tr class="courseSelectionRow" style="display: none;">
                <td colspan="2"></td>
                <td colspan="4">
                    <input type="button" value="GET MARKS FILLING SHEET >>" class="button-common" style="font-weight:normal;" onclick="fetchStudents()">
                    <input type="button" value="RESET" class="button-common" style="font-weight:normal;" onclick="window.location.href='{{ url_for('examination.student_marks_entry_external_user') }}'">
                </td>
            </tr>

            <!-- STUDENTS INFO AND GRID -->
            <tr class="marksGridSection" style="display: none;">
                <td colspan="4"></td>
                <td colspan="2">
                    <table cellspacing="0" rules="all" border="1" class="table-grid-view" style="width: 100%; border:1px solid #D4D4D4;border-collapse:collapse;">
                        <tbody>
                            <tr class="header-style">
                                <th scope="col" style="width: 220px">Degree</th>
                                <th scope="col" style="width: 80px">Semester</th>
                                <th scope="col" style="width: 80px">Student Count</th>
                            </tr>
                            <tr class="item-style" align="center" style="background-color:White;">
                                <td><span id="lbl_degree_name"></span></td>
                                <td><span id="lbl_semester_name"></span></td>
                                <td><span id="lbl_student_count"></span></td>
                            </tr>
                        </tbody>
                    </table>
                </td>
            </tr>

            <tr class="marksGridSection" style="display: none;">
                <td colspan="6" class="tablesubheading">Students Marks Filling Sheet</td>
            </tr>
            
            <tr class="marksGridSection" style="display: none;">
                <td colspan="6">
                    <div id="Div2" class="DivStyleWithScroll" style="width: 100%; max-height: 600px; overflow:auto;">
                        <table class="table-grid-view" cellspacing="1" cellpadding="1" rules="all" border="1" id="marksGridTable" style="width:100%;border:1px solid #D4D4D4;border-collapse:collapse;">
                            <thead>
                                <tr class="header-style" id="marksGridHeader">
                                    <!-- Dynamic headers -->
                                </tr>
                            </thead>
                            <tbody id="marksGridBody">
                                <!-- Dynamic rows -->
                            </tbody>
                        </table>
                    </div>
                </td>
            </tr>

            <tr class="marksGridSection" style="display: none;">
                <td colspan="2"></td>
                <td colspan="4" style="padding-top: 10px;">
                    <input type="hidden" name="alloc_ids" id="h_alloc_ids">
                    <input type="hidden" name="exam_map_ids" id="h_exam_map_ids">
                    <div id="actionButtons">
                        <input type="button" value="SAVE" class="button-common" onclick="submitMarks('SAVE')">
                        <input type="button" value="SUBMIT" class="button-common" onclick="submitMarks('SUBMIT')">
                    </div>
                </td>
            </tr>

        </tbody>
    </table>
</form>

<script>
function toggleRows(className, displayValue) {
    document.querySelectorAll('.' + className).forEach(el => {
        el.style.display = displayValue;
    });
}

function fetchCourses() {
    const session_id = document.getElementById('session_id').value;
    const th_pr = document.getElementById('th_pr') ? document.getElementById('th_pr').value : '';
    
    if(!session_id) {
        return;
    }
    
    // Fetch courses that have an external exam configured for the selected session and theory/practical mode
    fetch(`{{ url_for('examination.get_courses_for_external_user') }}?session_id=${session_id}&th_pr=${th_pr}`)
        .then(res => res.json())
        .then(data => {
            if(data.error) {
                alert(data.error);
                return;
            }
            if(!data.courses || data.courses.length === 0) {
                alert("No courses found for the selected session.");
                return;
            }
            
            const courseSelect = document.getElementById('course_id');
            let html = '<option value="">--Select Course--</option>';
            data.courses.forEach(c => {
                html += `<option value="${c.id}" data-th="${c.crhr_theory}" data-pr="${c.crhr_practical}" data-nc="${c.is_nc}">${c.name}</option>`;
            });
            courseSelect.innerHTML = html;
            
            document.getElementById('courseSelectionHeading').style.display = 'table-row';
            toggleRows('courseSelectionRow', 'table-row');
            toggleRows('marksGridSection', 'none');
        });
}

function onCourseSelect() {
    const courseSelect = document.getElementById('course_id');
    const selectedOpt = courseSelect.options[courseSelect.selectedIndex];
    
    if(!selectedOpt.value) {
        toggleRows('marksGridSection', 'none');
        document.getElementById('txtCrHrTheory').value = '';
        document.getElementById('txtCrHrPractical').value = '';
        document.getElementById('chkIsNC').checked = false;
        return;
    }
    
    document.getElementById('txtCrHrTheory').value = selectedOpt.getAttribute('data-th') || '0';
    document.getElementById('txtCrHrPractical').value = selectedOpt.getAttribute('data-pr') || '0';
    document.getElementById('chkIsNC').checked = (selectedOpt.getAttribute('data-nc') === '1' || selectedOpt.getAttribute('data-nc') === 'true');
}

function fetchStudents() {
    const session_id = document.getElementById('session_id').value;
    const course_id = document.getElementById('course_id').value;
    
    if(!course_id) {
        alert("Please select a course first.");
        return;
    }
    
    let url = `{{ url_for('examination.get_students_for_external_user') }}?session_id=${session_id}&course_id=${course_id}`;
    
    fetch(url)
        .then(res => res.json())
        .then(data => {
            if(data.error) {
                alert(data.error);
                return;
            }
            if(!data.columns || data.columns.length === 0) {
                alert("No active external weightage configuration found for this course.");
                return;
            }
            if(!data.students || data.students.length === 0) {
                alert("No students found allocated to this course.");
                return;
            }
            
            document.getElementById('lbl_degree_name').innerText = data.degree_name || 'N/A';
            document.getElementById('lbl_semester_name').innerText = data.semester_name || 'N/A';
            document.getElementById('lbl_student_count').innerText = data.student_count;
            
            document.getElementById('h_alloc_ids').value = JSON.stringify(data.alloc_ids);
            document.getElementById('h_exam_map_ids').value = JSON.stringify(data.exam_map_ids);
            
            // Render Headers
            const headerRow = document.getElementById('marksGridHeader');
            let headerHtml = `<th scope="col">S.No.</th><th scope="col">Student Name</th>`;
            data.columns.forEach(col => {
                headerHtml += `<th scope="col">${col.name}</th>`;
            });
            headerRow.innerHTML = headerHtml;
            
            // Render Rows
            const tbody = document.getElementById('marksGridBody');
            let bodyHtml = '';
            let isAnyLocked = false;
            
            data.students.forEach((s, idx) => {
                if(s.is_locked) isAnyLocked = true;
                const lockedAttr = s.is_locked ? 'readonly style="background:#f4f4f4;"' : '';
                const disabledAttr = s.is_locked ? 'disabled' : '';
                const bgColor = (idx % 2 === 0) ? 'White' : '#FAFAFA';
                
                let rowHtml = `
                <tr class="item-style" style="background-color:${bgColor};">
                    <td align="center" style="width:4%;">${idx + 1}</td>
                    <td align="left" style="width:20%;">
                        <span>${s.fullname} || ${s.enrollmentno} || ${s.roll_no}</span>
                    </td>`;
                    
                data.columns.forEach((col, c_idx) => {
                    const markData = s.marks[col.id] || {val: '', absent: false};
                    let markVal = markData.val;
                    if(markVal !== null && markVal !== undefined && markVal !== '') {
                        markVal = parseFloat(markVal).toString();
                    } else {
                        markVal = '';
                    }
                    const isAbs = markData.absent;
                    const tabindex = (c_idx * 2) + 1;
                    
                    rowHtml += `
                    <td>
                        <input type="hidden" name="max_${s.alloc_id}_${col.id}" value="${col.max_val}">
                        <div class="marks-entry-container">
                            <input type="number" step="0.01" name="marks_${s.alloc_id}_${col.id}" value="${isAbs ? '' : markVal}" 
                                   class="textbox marks-entry-input ${s.is_locked || isAbs ? 'marks-entry-locked' : ''}" ${lockedAttr} ${isAbs ? 'readonly' : ''} 
                                   id="txt_${s.alloc_id}_${col.id}" tabindex="${tabindex}"
                                   onblur="validateMarks(this, ${col.max_val})">
                            <input type="text" value="${col.max_val}" readonly="readonly" class="textbox marks-entry-max" tabindex="${tabindex + 1}">
                            <select name="absent_${s.alloc_id}_${col.id}" class="textbox marks-entry-dropdown" ${disabledAttr} 
                                    onchange="toggleAbs(this, 'txt_${s.alloc_id}_${col.id}')">
                                <option value="0" ${!isAbs ? 'selected' : ''}>P</option>
                                <option value="1" ${isAbs ? 'selected' : ''}>A</option>
                            </select>
                        </div>
                    </td>`;
                });
                
                rowHtml += `</tr>`;
                bodyHtml += rowHtml;
            });
            
            tbody.innerHTML = bodyHtml;
            toggleRows('marksGridSection', 'table-row');
            
            if(isAnyLocked) {
                document.getElementById('actionButtons').innerHTML = '<span style="color:red; font-weight:bold;">Marks have been submitted and locked.</span>';
            } else {
                document.getElementById('actionButtons').innerHTML = `
                    <input type="button" value="SAVE" class="button-common" onclick="submitMarks('SAVE')">
                    <input type="button" value="SUBMIT" class="button-common" onclick="submitMarks('SUBMIT')" style="margin-left: 10px;">
                `;
            }
        });
}

function validateMarks(inputObj, maxVal) {
    if(inputObj.value !== '') {
        const val = parseFloat(inputObj.value);
        const max = parseFloat(maxVal);
        if(val > max) {
            alert(`Marks Cannot Be Greater Than Max Marks (${max})`);
            inputObj.value = '';
            inputObj.focus();
        }
    }
}

function toggleAbs(selectObj, txtId) {
    const txtBox = document.getElementById(txtId);
    if(selectObj.value === '1') {
        txtBox.value = '';
        txtBox.readOnly = true;
        txtBox.style.background = '#f4f4f4';
    } else {
        txtBox.readOnly = false;
        txtBox.style.background = '#fff';
    }
}

function submitMarks(actionType) {
    if(actionType === 'SUBMIT') {
        if(!confirm('Are you sure you want to SUBMIT? Once submitted, marks will be locked and cannot be edited.')) {
            return;
        }
    }
    document.getElementById('formAction').value = actionType;
    document.getElementById('mainForm').submit();
}

window.onload = function() {
    if(document.getElementById('session_id').value && document.getElementById('course_id').value) {
        fetchCourses();
    }
};
</script>

{% endblock %}
